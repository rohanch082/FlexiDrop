<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FlexiDrop | Bags</title>
  <link rel="stylesheet" href="bags.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="bags-header">
  <h1>FlexiDrop</h1>
  <input type="text" id="searchBags" placeholder="Search bags...">
  <div class="cart">
    <a href="../Cart/cart.html">
      <i class="ri-shopping-cart-fill"></i>
      <span id="cartCount">0</span>
    </a>
  </div>
</header>

<!-- BAGS SECTION -->
<section id="bags-section">
  <h2>Bags Collection</h2>

  <div class="bags-container">

    <!-- 10 BAGS CARDS -->
    <div class="bags-card">
      <img src="https://plus.unsplash.com/premium_photo-1670984076180-22a6c8f27f2b?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&
      ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8bGVhdGhlciUyMGhhbmRiYWd8ZW58MHx8MHx8fDA%3D">
      <h3>Leather Handbag</h3>
      <p class="price">₹2499</p>
      <button>Add to Cart</button>
    </div>

    <div class="bags-card">
      <img src="https://media.istockphoto.com/id/701249440/photo/black-backpack-isolated-on-a-white-background.jpg?s=6
      12x612&w=0&k=20&c=_TgREOG50FuzsmUOiwl10MSlPoR1thr3ttnZTzVa-P8="
      <p class="price">₹1499</p>
      <button>Add to Cart</button>
    </div>

    <div class="bags-card">
      <img src="https://media.istockphoto.com/id/2211182510/photo/blue-blank-textile-tote-bag-mockup-template-for-shopping-with-handles-in-duotone-style-3d.jpg?s=612x612&w=0&k=20&c=V2ebmZZwVcL5IooLKI_WTYxBzlKwXr3YTNU31hlPldE=">
      <h3>Designer Tote Bag</h3>
      <p class="price">₹1999</p>
      <button>Add to Cart</button>
    </div>

    <div class="bags-card">
      <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=500&auto=format&fit=crop&q=60">
      <h3>Travel Duffel Bag</h3>
      <p class="price">₹2999</p>
      <button>Add to Cart</button>
    </div>

    <div class="bags-card">
      <img src="https://images.unsplash.com/photo-1590874103328-eac38a683ce7?w=500&auto=format&fit=crop&q=60">
      <h3>Laptop Bag</h3>
      <p class="price">₹2799</p>
      <button>Add to Cart</button>
    </div>

    <div class="bags-card">
      <img src="https://images.unsplash.com/photo-1585386959984-a4155222c7a4?w=500&auto=format&fit=crop&q=60">
      <h3>Sling Bag</h3>
      <p class="price">₹1199</p>
      <button>Add to Cart</button>
    </div>

    <div class="bags-card">
      <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=500&auto=format&fit=crop&q=60">
      <h3>Mini Shoulder Bag</h3>
      <p class="price">₹1699</p>
      <button>Add to Cart</button>
    </div>

    <div class="bags-card">
      <img src="https://images.unsplash.com/photo-1542060748-10c28b62716f?w=500&auto=format&fit=crop&q=60">
      <h3>Kids School Bag</h3>
      <p class="price">₹1299</p>
      <button>Add to Cart</button>
    </div>

    <div class="bags-card">
      <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=500&auto=format&fit=crop&q=60">
      <h3>Gym Bag</h3>
      <p class="price">₹1599</p>
      <button>Add to Cart</button>
    </div>

    <div class="bags-card">
      <img src="https://images.unsplash.com/photo-1583743814966-8936f37f4678?w=500&auto=format&fit=crop&q=60">
      <h3>Canvas Tote</h3>
      <p class="price">₹999</p>
      <button>Add to Cart</button>
    </div>

  </div>
</section>

<script src="bags.js"></script>
</body>
</html>
