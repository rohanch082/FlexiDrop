<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FlexiDrop | Watches</title>
  <link rel="stylesheet" href="watch.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="watch-header">
  <h1>FlexiDrop</h1>
  <input type="text" id="searchWatch" placeholder="Search watches...">
  <div class="cart">
    <a href="../Cart/cart.html">
      <i class="ri-shopping-cart-fill"></i>
      <span id="cartCount">0</span>
    </a>
  </div>
</header>

<!-- WATCH SECTION -->
<section id="watch-section">
  <h2>Watch Collection</h2>

  <div class="watch-container">

    <!-- 10 WATCH CARDS -->
    <div class="watch-card">
      <img src="https://images.unsplash.com/photo-1761284976242-d55d1e339805?ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8YWNjZXNzb3JpZXMlMjB3YXRjaHxlbnwwfHwwfHx8MA%3D%3D&auto=format&fit=crop&q=60&w=500" alt="Casino Watch">
        <h3>Casino Watch</h3>
        <p class="price">₹1499.00</p>
        <button>Add to Cart</button>
    </div>

    <div class="watch-card">
      <img src="https://images.unsplash.com/photo-1630552237339-9520955b603c?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fGxlYXRoZXIlMjB3YXRjaHxlbnwwfDJ8MHx8fDA%3D">
      <h3>Luxury Leather Watch</h3>
      <p class="price">₹3999</p>
      <button>Add to Cart</button>
    </div>

    <div class="watch-card">
      <img src="https://images.unsplash.com/photo-1673997303871-178507ca875a?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8c21hcnQlMjB3YXRjaHxlbnwwfDJ8MHx8fDA%3D">
      <h3>Smart Watch</h3>
      <p class="price">₹5999</p>
      <button>Add to Cart</button>
    </div>

    <div class="watch-card">
      <img src="https://images.unsplash.com/photo-1575311373937-040b8e1fd5b6?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8c21hcnQlMjB3YXRjaHxlbnwwfDJ8MHx8fDA%3D">
      <h3>Sports Digital Watch</h3>
      <p class="price">₹1999</p>
      <button>Add to Cart</button>
    </div>

    <div class="watch-card">
      <img src="https://images.unsplash.com/photo-1549972574-8e3e1ed6a347?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTd8fHNpbHZlciUyMHdhdGNofGVufDB8MnwwfHx8MA%3D%3D">
      <h3>Minimal Silver Watch</h3>
      <p class="price">₹3499</p>
      <button>Add to Cart</button>
    </div>

    <div class="watch-card">
      <img src="https://www.carlington.in/cdn/shop/products/CT_2038_Gold_1.webp?v=1708662950&width=2048">
      <h3>Rose Gold Watch</h3>
      <p class="price">₹2799</p>
      <button>Add to Cart</button>
    </div>

    <div class="watch-card">
      <img src="https://images.unsplash.com/photo-1761284976242-d55d1e339805?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y2hyb25vZ3JhcGglMjB3YXRjaHxlbnwwfDJ8MHx8fDA%3D">
      <h3>Chronograph Watch</h3>
      <p class="price">₹4599</p>
      <button>Add to Cart</button>
    </div>

    <div class="watch-card">
      <img src="https://images.unsplash.com/photo-1673997303871-178507ca875a?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fGRpZ2l0YWwlMjB3YXRjaHxlbnwwfDJ8MHx8fDA%3D">
      <h3>Kids Digital Watch</h3>
      <p class="price">₹1299</p>
      <button>Add to Cart</button>
    </div>

    <div class="watch-card">
      <img src="https://images.unsplash.com/photo-1684021661918-f970399f0694?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8bWVuJTIwZm9ybWFsJTIwd2F0Y2h8ZW58MHwyfDB8fHww">
      <h3>Men Formal Watch</h3>
      <p class="price">₹3199</p>
      <button>Add to Cart</button>
    </div>

    <div class="watch-card">
      <img src="https://images.unsplash.com/photo-1561634343-3a2787687046?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8d29tZW4lMjBlbGVnYW50JTIwd2F0Y2h8ZW58MHwyfDB8fHww">
      <h3>Women Elegant Watch</h3>
      <p class="price">₹2899</p>
      <button>Add to Cart</button>
    </div>

  </div>
</section>

<script src="watch.js"></script>
</body>
</html>
