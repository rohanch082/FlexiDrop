<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FlexiDrop | Home Decor</title>
  <link rel="stylesheet" href="home-decor.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="decor-header">
  <h1>FlexiDrop</h1>
  <input type="text" id="searchDecor" placeholder="Search home decor...">
  <div class="cart">
    <a href="../Cart/cart.html">
      <i class="ri-shopping-cart-fill"></i>
      <span id="cartCount">0</span>
    </a>
  </div>
</header>

<!-- HOME DECOR SECTION -->
<section id="decor-section">
  <h2>Home Decor Collection</h2>

  <div class="decor-container">

    <!-- 10 HOME DECOR CARDS -->
    <div class="decor-card">
      <img src="https://images.unsplash.com/photo-1582582429416-3c1b09e6a9e7?w=500&auto=format&fit=crop&q=60">
      <h3>Decorative Vase</h3>
      <p class="price">₹1499</p>
      <button>Add to Cart</button>
    </div>

    <div class="decor-card">
      <img src="https://images.unsplash.com/photo-1616593918824-4fef16054381?w=500&auto=format&fit=crop&q=60">
      <h3>Wall Art Frame</h3>
      <p class="price">₹1999</p>
      <button>Add to Cart</button>
    </div>

    <div class="decor-card">
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=500&auto=format&fit=crop&q=60">
      <h3>Table Lamp</h3>
      <p class="price">₹2299</p>
      <button>Add to Cart</button>
    </div>

    <div class="decor-card">
      <img src="https://images.unsplash.com/photo-1595526114035-0d45ed16cfbf?w=500&auto=format&fit=crop&q=60">
      <h3>Indoor Plant Pot</h3>
      <p class="price">₹899</p>
      <button>Add to Cart</button>
    </div>

    <div class="decor-card">
      <img src="https://images.unsplash.com/photo-1615874959474-d609969a20ed?w=500&auto=format&fit=crop&q=60">
      <h3>Cushion Set</h3>
      <p class="price">₹1299</p>
      <button>Add to Cart</button>
    </div>

    <div class="decor-card">
      <img src="https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?w=500&auto=format&fit=crop&q=60">
      <h3>Wooden Wall Clock</h3>
      <p class="price">₹1799</p>
      <button>Add to Cart</button>
    </div>

    <div class="decor-card">
      <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=500&auto=format&fit=crop&q=60">
      <h3>Floor Rug</h3>
      <p class="price">₹2999</p>
      <button>Add to Cart</button>
    </div>

    <div class="decor-card">
      <img src="https://images.unsplash.com/photo-1600488999585-e4364713b90b?w=500&auto=format&fit=crop&q=60">
      <h3>Showpiece Statue</h3>
      <p class="price">₹1599</p>
      <button>Add to Cart</button>
    </div>

    <div class="decor-card">
      <img src="https://images.unsplash.com/photo-1598300052160-47c2d43e7f3f?w=500&auto=format&fit=crop&q=60">
      <h3>Decorative Mirror</h3>
      <p class="price">₹3499</p>
      <button>Add to Cart</button>
    </div>

    <div class="decor-card">
      <img src="https://images.unsplash.com/photo-1589987607627-616cacb7c1fd?w=500&auto=format&fit=crop&q=60">
      <h3>Scented Candles</h3>
      <p class="price">₹699</p>
      <button>Add to Cart</button>
    </div>

  </div>
</section>

<script src="home-decor.js"></script>
</body>
</html>
