<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Address | FlexiDrop</title>

    <link rel="stylesheet" href="address.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

    <div class="container">

        <div class="address-box">

            <h1><i class="ri-map-pin-2-fill"></i> Shipping Address</h1>

            <form id="addressForm">

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name">
                </div>

                <div class="input-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="phone" placeholder="Enter mobile number">
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter email">
                </div>

                <div class="input-group">
                    <label>House No. / Building</label>
                    <input type="text" id="house" placeholder="Flat, House No., Building">
                </div>

                <div class="input-group">
                    <label>Area / Street</label>
                    <input type="text" id="street" placeholder="Area, Street, Colony">
                </div>

                <div class="row">

                    <div class="input-group">
                        <label>City</label>
                        <input type="text" id="city" placeholder="City">
                    </div>

                    <div class="input-group">
                        <label>State</label>
                        <input type="text" id="state" placeholder="State">
                    </div>

                </div>

                <div class="row">

                    <div class="input-group">
                        <label>Pincode</label>
                        <input type="number" id="pincode" placeholder="Pincode">
                    </div>

                    <div class="input-group">
                        <label>Country</label>
                        <input type="text" id="country" value="India">
                    </div>

                </div>

                <div class="input-group">
                    <label>Address Type</label>

                    <select id="type">
                        <option>Home</option>
                        <option>Office</option>
                        <option>Other</option>
                    </select>
                </div>

                <button type="submit">
                    Save Address
                </button>

            </form>

        </div>

    </div>

    <script src="address.js"></script>

</body>
</html>
