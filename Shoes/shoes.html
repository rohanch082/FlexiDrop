<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FlexiDrop | Shoes</title>
  <link rel="stylesheet" href="shoes.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<header class="shoes-header">
  <h1>FlexiDrop</h1>
  <input type="text" id="searchShoes" placeholder="Search shoes...">
  <div class="cart">
    <a href="../Cart/cart.html">
      <i class="ri-shopping-cart-fill"></i>
      <span id="cartCount">0</span>
    </a>
  </div>
</header>
